<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ARIA — OpenIndustry Algérie</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}

.logo{font-size:32px;font-weight:900;background:linear-gradient(135deg,#1f6feb,#238636);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.subtitle{font-size:13px;color:#8b949e;margin-bottom:36px;text-align:center;}

.cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:860px;}

.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px 24px;width:260px;transition:border-color .2s;}
.card:hover{border-color:#388bfd;}
.card-name{font-size:14px;font-weight:700;margin-bottom:4px;}
.card-meta{font-size:11px;color:#8b949e;margin-bottom:14px;}
.card-price{font-size:22px;font-weight:700;color:#d29922;margin-bottom:16px;}
.card-price span{font-size:11px;font-weight:400;color:#8b949e;}

.btn-call{display:block;width:100%;padding:10px;background:#1f6feb;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;text-align:center;text-decoration:none;cursor:pointer;transition:background .15s;}
.btn-call:hover{background:#388bfd;}
</style>
</head>
<body>

<div class="logo">ARIA</div>
<div class="subtitle">OpenIndustry Algérie · Invitations envoyées à sarahriehe@gmail.com</div>

<div class="cards">
  {% for s in suppliers %}
  <div class="card">
    <div class="card-name">{{ s.name }}</div>
    <div class="card-meta">{{ s.country }} · {{ s.city }}</div>
    <div class="card-price">{{ s.price_per_unit_usd }} USD/u <span>· {{ s.delivery_days }}j</span></div>
    <a class="btn-call" href="/call/{{ s.id }}" target="_blank">🎙️ Ouvrir l'appel</a>
  </div>
  {% endfor %}
</div>

</body>
</html>
