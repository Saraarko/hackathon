{% extends 'base.html' %}

{% block title %}Livres - Bibliothèque Numérique{% endblock %}

{% block content %}
<h2>Gestion des Livres</h2>

<button class="btn btn-success" onclick="openLivreModal()">➕ Ajouter un Livre</button>

<table class="table" id="livresTable">
    <thead>
        <tr>
            <th>Titre</th>
            <th>Date de Publication</th>
            <th>Auteur</th>
            <th>Résumé</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="livresBody">
        <tr>
            <td colspan="5" class="loading">Chargement...</td>
        </tr>
    </tbody>
</table>

<!-- Modal for adding/editing book -->
<div id="livreModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">Ajouter un Livre</h2>
            <button class="close" onclick="closeLivreModal()">&times;</button>
        </div>
        <form id="livreForm" onsubmit="saveLivre(event)">
            <div class="form-group">
                <label for="titre">Titre:</label>
                <input type="text" id="titre" name="titre" required>
            </div>
            <div class="form-group">
                <label for="datePublication">Date de Publication:</label>
                <input type="date" id="datePublication" name="date_publication">
            </div>
            <div class="form-group">
                <label for="auteur">Auteur:</label>
                <select id="auteur" name="auteur" required>
                    <option value="">Sélectionner un auteur</option>
                </select>
            </div>
            <div class="form-group">
                <label for="resume">Résumé:</label>
                <textarea id="resume" name="resume"></textarea>
            </div>
            <button type="submit" class="btn btn-success">Enregistrer</button>
        </form>
    </div>
</div>

<script>
let currentLivreId = null;
const API_URL = '/api/livres/';
const AUTEURS_URL = '/api/auteurs/';

// Load livres on page load
document.addEventListener('DOMContentLoaded', () => {
    loadAuteurs();
    loadLivres();
});

async function loadAuteurs() {
    try {
        const data = await apiCall(AUTEURS_URL);
        const select = document.getElementById('auteur');
        const options = data.map(auteur =>
            `<option value="${auteur.id}">${auteur.prenom} ${auteur.nom}</option>`
        ).join('');
        select.innerHTML = '<option value="">Sélectionner un auteur</option>' + options;
    } catch (error) {
        console.error('Error loading auteurs:', error);
    }
}

async function loadLivres() {
    try {
        const data = await apiCall(API_URL);
        const tbody = document.getElementById('livresBody');

        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Aucun livre trouvé</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(livre => `
            <tr>
                <td>${livre.titre}</td>
                <td>${livre.date_publication || 'N/A'}</td>
                <td>${livre.auteur_nom || livre.auteur}</td>
                <td>${livre.resume || 'N/A'}</td>
                <td>
                    <button class="btn" onclick="editLivre(${livre.id})">✏️ Modifier</button>
                    <button class="btn btn-danger" onclick="deleteLivre(${livre.id})">🗑️ Supprimer</button>
                </td>
            </tr>
        `).join('');
    } catch (error) {
        console.error('Error loading livres:', error);
    }
}

function openLivreModal() {
    currentLivreId = null;
    document.getElementById('modalTitle').textContent = 'Ajouter un Livre';
    document.getElementById('livreForm').reset();
    document.getElementById('livreModal').classList.add('show');
}

function closeLivreModal() {
    document.getElementById('livreModal').classList.remove('show');
}

window.onclick = function(event) {
    const modal = document.getElementById('livreModal');
    if (event.target === modal) {
        closeLivreModal();
    }
}

async function editLivre(id) {
    try {
        const livre = await apiCall(`${API_URL}${id}/`);
        currentLivreId = id;
        document.getElementById('modalTitle').textContent = 'Modifier un Livre';
        document.getElementById('titre').value = livre.titre;
        document.getElementById('datePublication').value = livre.date_publication || '';
        document.getElementById('auteur').value = livre.auteur;
        document.getElementById('resume').value = livre.resume || '';
        document.getElementById('livreModal').classList.add('show');
    } catch (error) {
        console.error('Error loading livre:', error);
    }
}

async function saveLivre(event) {
    event.preventDefault();

    const formData = {
        titre: document.getElementById('titre').value,
        date_publication: document.getElementById('datePublication').value || null,
        auteur: parseInt(document.getElementById('auteur').value),
        resume: document.getElementById('resume').value || ''
    };

    try {
        if (currentLivreId) {
            await apiCall(`${API_URL}${currentLivreId}/`, 'PUT', formData);
            showAlert('Livre modifié avec succès!', 'success');
        } else {
            await apiCall(API_URL, 'POST', formData);
            showAlert('Livre créé avec succès!', 'success');
        }
        closeLivreModal();
        loadLivres();
    } catch (error) {
        console.error('Error saving livre:', error);
    }
}

async function deleteLivre(id) {
    if (confirm('Êtes-vous sûr de vouloir supprimer ce livre?')) {
        try {
            await apiCall(`${API_URL}${id}/`, 'DELETE');
            showAlert('Livre supprimé avec succès!', 'success');
            loadLivres();
        } catch (error) {
            console.error('Error deleting livre:', error);
        }
    }
}
</script>
{% endblock %}
